name: SixLayerFramework
options:
  bundleIdPrefix: com.sixlayer
  deploymentTarget:
    iOS: "17.0"
    macOS: "15.0"
    tvOS: "17.0"
    watchOS: "10.0"
    visionOS: "1.0"
  xcodeVersion: "26.4"
  swiftVersion: "6.0"
  CODE_SIGN_STYLE: Automatic
  CODE_SIGNING_REQUIRED: YES
  DEVELOPMENT_TEAM: Y53G7YPJSZ
  developmentTeam: Y53G7YPJSZ
  developmentLanguage: en
  usesTabs: false
  indentWidth: 4
  tabWidth: 4

# Project-level build settings (Xcode recommended: localizability, symbols, asset extensions)
settings:
  base:
    # Must appear in generated build settings (not only options.developmentTeam) so every target,
    # including macOS TestApp and UI test runner, signs with the team. Omitting this yields ad-hoc
    # signing and Gatekeeper “unidentified developer” when running SixLayerFrameworkUITests_macOS.
    DEVELOPMENT_TEAM: Y53G7YPJSZ
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    "CODE_SIGN_IDENTITY[sdk=macosx*]": "Apple Development"
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRING_CATALOG_SYMBOL_GENERATION: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
  configs:
    Debug:
      DEAD_CODE_STRIPPING: YES
      ENABLE_USER_SCRIPT_SANDBOXING: YES
      SWIFT_STRING_CATALOG_SYMBOL_GENERATION: YES
    Release:
      DEAD_CODE_STRIPPING: YES
      ENABLE_USER_SCRIPT_SANDBOXING: YES
      SWIFT_STRING_CATALOG_SYMBOL_GENERATION: YES

packages:
  ViewInspector:
    url: https://github.com/nalexn/ViewInspector
    version: 0.10.3

targets:
  # Main framework target - supports both iOS and macOS
  SixLayerFramework:
    type: framework
    platform: [iOS, macOS, tvOS, watchOS, visionOS]
    sources:
      - path: Framework/Sources
        excludes:
          - "**/ExampleHelpers.swift"
          - "**/ExtensibleHintsExample.swift"
      - path: Framework/Resources
        excludes:
          - "**/*.lproj/**"
    resources:
      - path: Framework/Resources/Localizable.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework
        PRODUCT_MODULE_NAME: SixLayerFramework
        SWIFT_VERSION: "6.0"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) ENABLE_PREVIEWS
        ENABLE_TESTABILITY: YES
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEAD_CODE_STRIPPING: YES
        CLANG_ENABLE_MODULE_VERIFIER: YES
        CODE_SIGN_IDENTITY: "Apple Development"
        "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "Apple Development"
        "CODE_SIGN_IDENTITY[sdk=macosx*]": "Apple Development"
    dependencies: []

  # Consumer-facing test utilities (mocks, XCTest navigation helpers). Module `SixLayerTestKit` (#119, #229).
  # Per-platform targets (not multiplatform) so XcodeGen can wire `SixLayerFramework_*` dependencies.
  SixLayerTestKit_iOS:
    type: framework
    platform: iOS
    productName: SixLayerTestKit
    sources:
      - path: Framework/TestKit/Sources
    settings:
      base:
        # PRODUCT_NAME must match Swift module so `import SixLayerTestKit` resolves when linking this framework.
        PRODUCT_NAME: SixLayerTestKit
        PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.testkit
        PRODUCT_MODULE_NAME: SixLayerTestKit
        SWIFT_VERSION: "6.0"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) ENABLE_PREVIEWS
        ENABLE_TESTABILITY: YES
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEAD_CODE_STRIPPING: YES
        CLANG_ENABLE_MODULE_VERIFIER: YES
        CODE_SIGN_IDENTITY: "Apple Development"
        "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "Apple Development"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies:
      - target: SixLayerFramework_iOS
      - sdk: XCTest.framework

  SixLayerTestKit_macOS:
    type: framework
    platform: macOS
    productName: SixLayerTestKit
    sources:
      - path: Framework/TestKit/Sources
    settings:
      base:
        PRODUCT_NAME: SixLayerTestKit
        PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.testkit
        PRODUCT_MODULE_NAME: SixLayerTestKit
        SWIFT_VERSION: "6.0"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) ENABLE_PREVIEWS
        ENABLE_TESTABILITY: YES
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEAD_CODE_STRIPPING: YES
        CLANG_ENABLE_MODULE_VERIFIER: YES
        CODE_SIGN_IDENTITY: "Apple Development"
        "CODE_SIGN_IDENTITY[sdk=macosx*]": "Apple Development"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
    dependencies:
      - target: SixLayerFramework_macOS
      - sdk: XCTest.framework

  # Unit tests - iOS
  SixLayerFrameworkUnitTests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Development/Tests/Shared/TestHelpers
      - path: Development/Tests/NavigationLayoutResolverTests
      - path: Development/Tests/SixLayerFrameworkUnitTests
        excludes:
          - "**/README.md"
          - "**/CoreDataTestingGuide.md"
          - "ViewInspectorTests/**/CoreDataTestingGuide.md"
          - "ViewInspectorTests/**"  # Temporarily exclude ViewInspector tests
          - "Utilities/Debug/EnvironmentVariableDebugTests.swift"  # Uses ViewInspector
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.unit-tests
      SWIFT_VERSION: "6.0"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited)
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
    dependencies:
      - target: SixLayerFramework_iOS
      - package: ViewInspector
        product: ViewInspector

  # ViewInspector tests - iOS (includes ViewInspectorTests directory)
  SLFiOSViewInspectorTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Development/Tests/Shared/TestHelpers
      - path: Development/Tests/Shared/RealUIAuditHosts
      - path: Development/Tests/SixLayerFrameworkUnitTests/ViewInspectorTests
        excludes:
          - "**/README.md"
          - "**/CoreDataTestingGuide.md"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.viewinspector-tests
      SWIFT_VERSION: "6.0"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited)
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
    dependencies:
      - target: SixLayerFramework_iOS
      - package: ViewInspector
        product: ViewInspector

  # ViewInspector tests - macOS (includes ViewInspectorTests directory)
  SLFmacOSViewInspectorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Development/Tests/Shared/TestHelpers
      - path: Development/Tests/Shared/RealUIAuditHosts
      - path: Development/Tests/SixLayerFrameworkUnitTests/ViewInspectorTests
        excludes:
          - "**/README.md"
          - "**/CoreDataTestingGuide.md"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.viewinspector-tests
      SWIFT_VERSION: "6.0"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited)
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
      DEAD_CODE_STRIPPING: YES
    dependencies:
      - target: SixLayerFramework_macOS
      - package: ViewInspector
        product: ViewInspector

  # Unit tests - macOS
  SixLayerFrameworkUnitTests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Development/Tests/Shared/TestHelpers
      - path: Development/Tests/NavigationLayoutResolverTests
      - path: Development/Tests/SixLayerFrameworkUnitTests
        excludes:
          - "**/README.md"
          - "**/CoreDataTestingGuide.md"
          - "ViewInspectorTests/**/CoreDataTestingGuide.md"
          - "ViewInspectorTests/**"  # Exclude ViewInspector tests - they have their own scheme
          - "Utilities/Debug/EnvironmentVariableDebugTests.swift"  # Uses ViewInspector
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.unit-tests
      SWIFT_VERSION: "6.0"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited)
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
      DEAD_CODE_STRIPPING: YES
    dependencies:
      - target: SixLayerFramework_macOS
      - package: ViewInspector
        product: ViewInspector

  # Unit tests - tvOS
  SixLayerFrameworkUnitTests_tvOS:
    type: bundle.unit-test
    platform: tvOS
    sources:
      - path: Development/Tests/Shared/TestHelpers
      - path: Development/Tests/NavigationLayoutResolverTests
      - path: Development/Tests/SixLayerFrameworkUnitTests
        excludes:
          - "**/README.md"
          - "**/CoreDataTestingGuide.md"
          - "ViewInspectorTests/**/CoreDataTestingGuide.md"
          - "ViewInspectorTests/**"  # Exclude ViewInspector tests - they have their own scheme
          - "Utilities/Debug/EnvironmentVariableDebugTests.swift"  # ViewInspector debug; match iOS/macOS unit (#248)
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.unit-tests
      SWIFT_VERSION: "6.0"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited)
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
    dependencies:
      - target: SixLayerFramework_tvOS

  # Unit tests - watchOS
  SixLayerFrameworkUnitTests_watchOS:
    type: bundle.unit-test
    platform: watchOS
    sources:
      - path: Development/Tests/Shared/TestHelpers
      - path: Development/Tests/NavigationLayoutResolverTests
      - path: Development/Tests/SixLayerFrameworkUnitTests
        excludes:
          - "**/README.md"
          - "**/CoreDataTestingGuide.md"
          - "ViewInspectorTests/**/CoreDataTestingGuide.md"
          - "ViewInspectorTests/**"  # Exclude ViewInspector tests - they have their own scheme
          - "Utilities/Debug/EnvironmentVariableDebugTests.swift"  # ViewInspector debug; match iOS/macOS unit (#248)
          - "Layers/Layer4-Component/Layer4SemanticAccessibilityCriterionTests.swift"  # UIKit UIView hosting a11y traversal; watchOS has no UIHostingController (#233)
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.unit-tests
      SWIFT_VERSION: "6.0"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited)
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
    dependencies:
      - target: SixLayerFramework_watchOS
      - package: ViewInspector
        product: ViewInspector

  # Unit tests - visionOS
  SixLayerFrameworkUnitTests_visionOS:
    type: bundle.unit-test
    platform: visionOS
    sources:
      - path: Development/Tests/Shared/TestHelpers
      - path: Development/Tests/NavigationLayoutResolverTests
      - path: Development/Tests/SixLayerFrameworkUnitTests
        excludes:
          - "**/README.md"
          - "**/CoreDataTestingGuide.md"
          - "ViewInspectorTests/**/CoreDataTestingGuide.md"
          - "ViewInspectorTests/**"  # Exclude ViewInspector tests - they have their own scheme
          - "Utilities/Debug/EnvironmentVariableDebugTests.swift"  # ViewInspector debug; match iOS/macOS unit (#248)
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.unit-tests
      SWIFT_VERSION: "6.0"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited)
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
    dependencies:
      - target: SixLayerFramework_visionOS

  # UI tests - iOS (XCUITest against TestApp; includes WindowRenderingTestHelper)
  SixLayerFrameworkUITests_iOS:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Development/Tests/SixLayerFrameworkUITests
        excludes:
          - "TestApp/**"
          - "README.md"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.ui-tests
      SWIFT_VERSION: "6.0"
      # Explicit modules + embedded Swift frameworks in ui-testing bundles can fail to resolve
      # linked framework modules (SixLayerTestKit); match stable driver behavior (#229, #256).
      SWIFT_ENABLE_EXPLICIT_MODULES: NO
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
      DEAD_CODE_STRIPPING: YES
      TEST_TARGET_NAME: SixLayerFrameworkTestApp_iOS
    dependencies:
      - target: SixLayerFramework_iOS
      - target: SixLayerFrameworkTestApp_iOS
      - target: SixLayerTestKit_iOS

  # UI tests - macOS (XCUITest against TestApp; includes WindowRenderingTestHelper)
  SixLayerFrameworkUITests_macOS:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Development/Tests/SixLayerFrameworkUITests
        excludes:
          - "TestApp/**"
          - "README.md"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.ui-tests
      SWIFT_VERSION: "6.0"
      SWIFT_ENABLE_EXPLICIT_MODULES: NO
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
      DEVELOPMENT_TEAM: Y53G7YPJSZ
      ENABLE_TESTING_SEARCH_PATHS: YES
      DEAD_CODE_STRIPPING: YES
      TEST_TARGET_NAME: SixLayerFrameworkTestApp_macOS
    dependencies:
      - target: SixLayerFramework_macOS
      - target: SixLayerFrameworkTestApp_macOS
      - target: SixLayerTestKit_macOS

  # UI tests - tvOS (same test sources; no TestApp for tvOS)
  # Note: XCUITest .tap() is unavailable on tvOS (uses focus/remote model, not touch).
  # All *UITests.swift files and XCUITestHelpers.swift are iOS-touch-based and excluded here.
  # tvOS-native UI tests (focus engine driven) are tracked under epic #233 / issue #241.
  SixLayerFrameworkUITests_tvOS:
    type: bundle.ui-testing
    platform: tvOS
    sources:
      - path: Development/Tests/SixLayerFrameworkUITests
        excludes:
          - "TestApp/**"
          - "README.md"
          - "**/*UITests.swift"
          - "XCUITestHelpers.swift"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.ui-tests
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
    dependencies:
      - target: SixLayerFramework_tvOS

  # UI tests - watchOS (same test sources; no TestApp for watchOS)
  # Note: XCUITest .tap() is unavailable on watchOS; touch-based helpers excluded.
  # watchOS-native UI tests tracked under epic #233 / issue #241.
  SixLayerFrameworkUITests_watchOS:
    type: bundle.ui-testing
    platform: watchOS
    sources:
      - path: Development/Tests/SixLayerFrameworkUITests
        excludes:
          - "TestApp/**"
          - "README.md"
          - "**/*UITests.swift"
          - "XCUITestHelpers.swift"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.ui-tests
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
    dependencies:
      - target: SixLayerFramework_watchOS

  # UI tests - visionOS (same test sources; no TestApp for visionOS)
  # UI tests - visionOS: XCUITest APIs used by current tests are iOS-specific;
  # current tests excluded until visionOS-native UI tests are designed (tracked under #233/#241).
  SixLayerFrameworkUITests_visionOS:
    type: bundle.ui-testing
    platform: visionOS
    sources:
      - path: Development/Tests/SixLayerFrameworkUITests
        excludes:
          - "TestApp/**"
          - "README.md"
          - "**/*UITests.swift"
          - "XCUITestHelpers.swift"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.ui-tests
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
    dependencies:
      - target: SixLayerFramework_visionOS

  # Test app for XCUITest - macOS
  # Minimal app that displays views for XCUITest to test
  SixLayerFrameworkTestApp_macOS:
    type: application
    platform: macOS
    sources:
      - path: Development/Tests/Shared/RealUIAuditHosts
      - path: Development/Tests/SixLayerFrameworkUITests/TestApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.test-app
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
      DEVELOPMENT_TEAM: Y53G7YPJSZ
      MACOSX_DEPLOYMENT_TARGET: "15.0"
    dependencies:
      - target: SixLayerFramework_macOS

  # Test app for XCUITest - iOS
  # Minimal app that displays views for XCUITest to test
  SixLayerFrameworkTestApp_iOS:
    type: application
    platform: iOS
    sources:
      - path: Development/Tests/Shared/RealUIAuditHosts
      - path: Development/Tests/SixLayerFrameworkUITests/TestApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.test-app
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies:
      - target: SixLayerFramework_iOS


  # External integration tests - iOS
  SixLayerFrameworkExternalIntegrationTests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Development/Tests/Shared/TestHelpers
      - path: Development/Tests/SixLayerFrameworkExternalIntegrationTests
        excludes:
          - "**/README.md"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.external-integration-tests
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
    dependencies:
      - target: SixLayerFramework_iOS
      - package: ViewInspector
        product: ViewInspector

  # External integration tests - macOS
  SixLayerFrameworkExternalIntegrationTests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Development/Tests/Shared/TestHelpers
      - path: Development/Tests/SixLayerFrameworkExternalIntegrationTests
        excludes:
          - "**/README.md"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.external-integration-tests
      SWIFT_VERSION: "6.0"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited)
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
      DEAD_CODE_STRIPPING: YES
    dependencies:
      - target: SixLayerFramework_macOS
      - package: ViewInspector
        product: ViewInspector

  # External integration tests - tvOS
  SixLayerFrameworkExternalIntegrationTests_tvOS:
    type: bundle.unit-test
    platform: tvOS
    sources:
      - path: Development/Tests/Shared/TestHelpers
      - path: Development/Tests/SixLayerFrameworkExternalIntegrationTests
        excludes:
          - "**/README.md"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.external-integration-tests
      SWIFT_VERSION: "6.0"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited)
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
    dependencies:
      - target: SixLayerFramework_tvOS

  # External integration tests - watchOS
  SixLayerFrameworkExternalIntegrationTests_watchOS:
    type: bundle.unit-test
    platform: watchOS
    sources:
      - path: Development/Tests/Shared/TestHelpers
      - path: Development/Tests/SixLayerFrameworkExternalIntegrationTests
        excludes:
          - "**/README.md"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.external-integration-tests
      SWIFT_VERSION: "6.0"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited)
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
    dependencies:
      - target: SixLayerFramework_watchOS
      - package: ViewInspector
        product: ViewInspector

  # External integration tests - visionOS
  SixLayerFrameworkExternalIntegrationTests_visionOS:
    type: bundle.unit-test
    platform: visionOS
    sources:
      - path: Development/Tests/Shared/TestHelpers
      - path: Development/Tests/SixLayerFrameworkExternalIntegrationTests
        excludes:
          - "**/README.md"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sixlayer.framework.external-integration-tests
      SWIFT_VERSION: "6.0"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited)
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      ENABLE_TESTING_SEARCH_PATHS: YES
    dependencies:
      - target: SixLayerFramework_visionOS

# Scheme Test action: every listed test bundle uses parallel workers + random test order (Xcode
# scheme; pair with xcodebuild -parallel-testing-enabled YES in buildconfig.yml). UITest targets
# included — revisit if parallel UI classes expose ordering or shared-state flakes.
#
# XcodeGen emits verbose *.xcscheme XML; Xcode on open/save often aligns that XML with the same
# scheme intent you declare here (leaner attributes, different Scheme `version`, etc.). Those
# details are not configured line-by-line below—serialization differs by tool. Commit Xcode’s
# scheme output when Xcode updates it; see `.cursor/rules/project-yml-exclusive.mdc`.
schemes:
  SLF-iOS-Framework:
    build:
      targets:
        SixLayerFramework_iOS: all
    test:
      targets:
        - name: SixLayerFrameworkUnitTests_iOS
          parallelizable: true
          randomExecutionOrder: true
        - name: SixLayerFrameworkExternalIntegrationTests_iOS
          parallelizable: true
          randomExecutionOrder: true

  SLF-macOS-Framework:
    build:
      targets:
        SixLayerFramework_macOS: all
    test:
      targets:
        - name: SixLayerFrameworkUnitTests_macOS
          parallelizable: true
          randomExecutionOrder: true
        - name: SixLayerFrameworkExternalIntegrationTests_macOS
          parallelizable: true
          randomExecutionOrder: true

  SLF-macOS-TestApp:
    build:
      targets:
        SixLayerFrameworkTestApp_macOS: all
    test:
      targets: []

  SLF-iOS-TestApp:
    build:
      targets:
        SixLayerFrameworkTestApp_iOS: all
    test:
      targets: []

  SLF-iOS-AllTests:
    build:
      targets:
        SixLayerFramework_iOS: all
        SixLayerFrameworkTestApp_iOS: all
    test:
      targets:
        - name: SixLayerFrameworkUnitTests_iOS
          parallelizable: true
          randomExecutionOrder: true
        - name: SLFiOSViewInspectorTests
          parallelizable: true
          randomExecutionOrder: true
        - name: SixLayerFrameworkUITests_iOS
          parallelizable: true
          randomExecutionOrder: true
        - name: SixLayerFrameworkExternalIntegrationTests_iOS
          parallelizable: true
          randomExecutionOrder: true

  SLF-macOS-AllTests:
    build:
      targets:
        SixLayerFramework_macOS: all
        SixLayerFrameworkTestApp_macOS: all
    test:
      targets:
        - name: SixLayerFrameworkUnitTests_macOS
          parallelizable: true
          randomExecutionOrder: true
        - name: SLFmacOSViewInspectorTests
          parallelizable: true
          randomExecutionOrder: true
        - name: SixLayerFrameworkUITests_macOS
          parallelizable: true
          randomExecutionOrder: true
        - name: SixLayerFrameworkExternalIntegrationTests_macOS
          parallelizable: true
          randomExecutionOrder: true

  SLF-iOS-UnitTests:
    build:
      targets:
        SixLayerFramework_iOS: all
        SixLayerFrameworkUnitTests_iOS: all
    test:
      targets:
        - name: SixLayerFrameworkUnitTests_iOS
          parallelizable: true
          randomExecutionOrder: true

  SLF-macOS-UnitTests:
    build:
      targets:
        SixLayerFramework_macOS: all
        SixLayerFrameworkUnitTests_macOS: all
    test:
      targets:
        - name: SixLayerFrameworkUnitTests_macOS
          parallelizable: true
          randomExecutionOrder: true

  SLF-macOS-UITests:
    build:
      targets:
        SixLayerFramework_macOS: all
        SixLayerFrameworkTestApp_macOS: all
        SixLayerFrameworkUITests_macOS: all
    test:
      targets:
        - name: SixLayerFrameworkUITests_macOS
          parallelizable: true
          randomExecutionOrder: true

  SLF-iOS-UITests:
    build:
      targets:
        SixLayerFramework_iOS: all
        SixLayerFrameworkTestApp_iOS: all
        SixLayerFrameworkUITests_iOS: all
    test:
      targets:
        - name: SixLayerFrameworkUITests_iOS
          parallelizable: true
          randomExecutionOrder: true

  SLF-macOS-ViewInspectorTests:
    build:
      targets:
        SixLayerFramework_macOS: all
        SLFmacOSViewInspectorTests: all
    test:
      targets:
        - name: SLFmacOSViewInspectorTests
          parallelizable: true
          randomExecutionOrder: true

  SLF-iOS-ViewInspectorTests:
    build:
