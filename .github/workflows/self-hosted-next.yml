# Self-hosted runner: per-platform AllTests when `next` updates.
# Schemes match project.yml / buildconfig.yml (unit + ViewInspector + UI + external integration).
#
# macOS + iOS are required. tvOS, watchOS, and visionOS are informational (continue-on-error).
#
# Runner: `runs-on: self-hosted` — add labels if your runner uses custom tags.
name: Self-hosted (next)

on:
  push:
    branches: [next]
  workflow_dispatch:

concurrency:
  group: self-hosted-next-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-tests:
    name: macOS (SLF-macOS-AllTests)
    runs-on: self-hosted
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Xcode project (XcodeGen)
        run: |
          set -euo pipefail
          if [[ -x /opt/homebrew/bin/brew ]]; then
            eval "$(/opt/homebrew/bin/brew shellenv)"
          elif [[ -x /usr/local/bin/brew ]]; then
            eval "$(/usr/local/bin/brew shellenv)"
          fi
          command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
          xcodegen generate

      - name: Run macOS tests (SLF-macOS-AllTests)
        run: |
          set -euo pipefail
          mkdir -p build
          set -o pipefail
          xcodebuild test \
            -project SixLayerFramework.xcodeproj \
            -scheme "SLF-macOS-AllTests" \
            -destination 'platform=macOS,arch=arm64' \
            -configuration Debug \
            -allowProvisioningUpdates \
            -parallel-testing-enabled YES \
            -resultBundlePath "build/SLF-macOS-AllTests.xcresult"

      - name: Upload macOS test result bundle
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xcresult-macos
          path: build/SLF-macOS-AllTests.xcresult
          if-no-files-found: ignore

  ios-tests:
    name: iOS (SLF-iOS-AllTests)
    runs-on: self-hosted
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Xcode project (XcodeGen)
        run: |
          set -euo pipefail
          if [[ -x /opt/homebrew/bin/brew ]]; then
            eval "$(/opt/homebrew/bin/brew shellenv)"
          elif [[ -x /usr/local/bin/brew ]]; then
            eval "$(/usr/local/bin/brew shellenv)"
          fi
          command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
          xcodegen generate

      - name: Run iOS tests (SLF-iOS-AllTests)
        run: |
          set -euo pipefail
          mkdir -p build
          set -o pipefail
          xcodebuild test \
            -project SixLayerFramework.xcodeproj \
            -scheme "SLF-iOS-AllTests" \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max' \
            -configuration Debug \
            -allowProvisioningUpdates \
            -parallel-testing-enabled YES \
            -maximum-concurrent-test-simulator-destinations 2 \
            -resultBundlePath "build/SLF-iOS-AllTests.xcresult"

      - name: Upload iOS test result bundle
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xcresult-ios
          path: build/SLF-iOS-AllTests.xcresult
          if-no-files-found: ignore

  tvos-tests:
