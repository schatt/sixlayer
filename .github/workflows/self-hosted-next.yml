        run: |
          set -euo pipefail
          mkdir -p build "$CI_DERIVED_DATA" "$CI_SPM_CHECKOUTS"
          set -o pipefail
          xcodebuild test \
            -project SixLayerFramework.xcodeproj \
            -scheme "SLF-watchOS-AllTests" \
            -destination 'platform=watchOS Simulator,name=Apple Watch Series 11 (46mm)' \
